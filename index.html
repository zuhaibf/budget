<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Budget Manager Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseClient = supabase.createClient(
  "https://avxkcflgbgpxmheszrwj.supabase.co",
  "sb_publishable_tYY2EV-k2mesi0i-URIGSQ_DzJGZOjx"
);
</script>

<style>
:root {
  --bg:#0b0b0b;
  --card:#151515;
  --field:#1f1f1f;
  --text:#fff;
  --muted:#9ca3af;
  --accent:#3b82f6;
  --danger:#ef4444;
  --success:#22c55e;
}

* { box-sizing:border-box; }

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg);
  color:var(--text);
  max-width:420px;
  margin:auto;
}

.container { padding:16px; padding-bottom:110px; }

.card {
  background:var(--card);
  padding:16px;
  border-radius:18px;
  margin-bottom:12px;
}

.row {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.green { color:var(--success); }
.red { color:var(--danger); }

.hidden { display:none; }

/* FLOATING FIELD */
.field {
  position:relative;
  margin-top:18px;
}

.field input,
.field select {
  width:100%;
  padding:34px 14px 18px;
  border:none;
  border-radius:14px;
  background:var(--field);
  color:white;
  font-size:17px;
  line-height:1.5;
  outline:none;
  appearance:none;
  transition:all .25s cubic-bezier(0.34,1.56,0.64,1);
}

.field::after {
  content:"";
  position:absolute;
  bottom:10px;
  left:14px;
  right:14px;
  height:1px;
  background:rgba(255,255,255,0.08);
}

.field label {
  position:absolute;
  left:14px;
  top:22px;
  font-size:15px;
  color:var(--muted);
  transition:all .25s cubic-bezier(0.34,1.56,0.64,1);
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field select:focus + label,
.field select:not([value=""]) + label {
  top:8px;
  font-size:12px;
  color:var(--accent);
}

.field input:focus,
.field select:focus {
  box-shadow:0 0 0 2px rgba(59,130,246,0.4);
}

.field input::placeholder {
  opacity:0;
  transition:opacity .2s ease;
}

.field input:focus::placeholder {
  opacity:0.3;
}

.field select {
  background-image:url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 24 24' stroke='white' fill='none' stroke-width='2'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
  background-repeat:no-repeat;
  background-position:right 12px center;
}

.field.error input,
.field.error select {
  box-shadow:0 0 0 2px rgba(239,68,68,0.5);
}

.error-msg {
  color:var(--danger);
  font-size:12px;
  margin-top:4px;
}

button {
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  margin-top:26px;
  font-weight:600;
  background:white;
  color:black;
}

/* FIX: prevent + button from stretching */
.nav-item.primary {
  width:56px !important;
  height:56px !important;
}

.nav {
  position:fixed;
  bottom:12px;
  width:100%;
  max-width:420px;
  display:flex;
  justify-content:center;
}

.nav-inner {
  width:90%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:10px 16px;
}

.nav-item {
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:11px;
  color:#aaa;
  background:none;
  border:none;
}

.nav-item.active { color:white; }

.nav-item.primary {
  border-radius:50%;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:-30px;
}

.empty {
  text-align:center;
  color:#666;
  padding:16px;
}
</style>
</head>

<body>

<div class="container">

<!-- HOME -->
<div id="home">
  <h2>Overview</h2>

  <div class="row">
    <div class="card" style="flex:1;margin-right:6px;">
      <small>Income</small>
      <div class="green" id="income">₹0</div>
    </div>
    <div class="card" style="flex:1;margin-left:6px;">
      <small>Expense</small>
      <div class="red" id="expense">₹0</div>
    </div>
  </div>

  <div class="card">
    <h3>Recent Transactions</h3>
    <div id="list"></div>
  </div>
</div>

<!-- CHARTS -->
<div id="charts" class="hidden">
  <h2>Analytics</h2>
  <div class="card"><canvas id="barChart"></canvas></div>
  <div class="card"><canvas id="pieChart"></canvas></div>
</div>

<!-- ADD -->
<div id="add" class="hidden">
  <h2>Add Transaction</h2>

  <div class="field" id="amountField">
    <input id="amount" type="number" placeholder="Amount"/>
    <label>Amount</label>
    <div class="error-msg hidden">Enter amount</div>
  </div>

  <div class="field">
    <select id="type">
      <option value="expense">Expense</option>
      <option value="income">Income</option>
    </select>
    <label>Type</label>
  </div>

  <div class="field">
    <select id="category"></select>
    <label>Category</label>
  </div>

  <div class="field">
    <input id="date" type="datetime-local" placeholder=" "/>
    <label>Date & Time</label>
  </div>

  <button id="saveBtn">Save</button>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">

    <button id="nav-home" class="nav-item active" onclick="show('home')">
      <svg width="20" height="20" stroke="currentColor" fill="none" stroke-width="2">
        <path d="M3 10L12 3l9 7"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      <span>Home</span>
    </button>

    <button id="nav-charts" class="nav-item" onclick="show('charts')">
      <svg width="20" height="20" stroke="currentColor" fill="none" stroke-width="2">
        <rect x="3" y="10" width="4" height="10"/>
        <rect x="10" y="6" width="4" height="14"/>
        <rect x="17" y="3" width="4" height="17"/>
      </svg>
      <span>Charts</span>
    </button>

    <button class="nav-item primary" onclick="show('add')">
      <svg width="22" height="22" stroke="black" fill="none" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

  </div>
</div>

<script>
const amountEl = document.getElementById("amount");
const typeEl = document.getElementById("type");
const categoryEl = document.getElementById("category");
const dateEl = document.getElementById("date");

const incomeEl = document.getElementById("income");
const expenseEl = document.getElementById("expense");
const listEl = document.getElementById("list");
const amountField = document.getElementById("amountField");

let data = [];

const categoryMap = {
  expense: ["Food","Rent","Shopping","Travel"],
  income: ["Salary","Freelance","Bonus"]
};

function updateCategories() {
  const selectedType = typeEl.value;
  const categories = categoryMap[selectedType];
  categoryEl.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join("");
}

typeEl.addEventListener("change", updateCategories);

document.getElementById("saveBtn").onclick = async () => {
  let valid = true;

  if (!amountEl.value) {
    amountField.classList.add("error");
    amountField.querySelector(".error-msg").classList.remove("hidden");
    valid = false;
  } else {
    amountField.classList.remove("error");
    amountField.querySelector(".error-msg").classList.add("hidden");
  }

  if (!valid) return;

  await supabaseClient.from("transactions").insert([
    {
      amount: +amountEl.value,
      type: typeEl.value,
      category: categoryEl.value,
      date: dateEl.value || new Date().toISOString()
    }
  ]);

  await loadData();
  show('home');
};

function show(page){
  ["home","charts","add"].forEach(p=>{
    document.getElementById(p).classList.add("hidden");
  });

  document.getElementById(page).classList.remove("hidden");

  if(page==="add"){
    dateEl.value = new Date().toISOString().slice(0,16);
    updateCategories();
  }
}

let barChart, pieChart;

async function loadData(){
  const { data: rows } = await supabaseClient
    .from("transactions")
    .select("*")
    .order("date", { ascending: false });

  data = rows || [];
  render();
}

function render(){
  let income=0, expense=0, map={};

  data.forEach(t=>{
    if(t.type==="income") income+=t.amount;
    else {
      expense+=t.amount;
      map[t.category]=(map[t.category]||0)+t.amount;
    }
  });

  incomeEl.innerText="₹"+income;
  expenseEl.innerText="₹"+expense;

  listEl.innerHTML = data.length
    ? data.slice(0,5).map(t=>`
      <div class="row">
        <div>
          <div>${t.category}</div>
          <small>${new Date(t.date).toLocaleString()}</small>
        </div>
        <div class="${t.type==="expense"?"red":"green"}">₹${t.amount}</div>
      </div>
    `).join("")
    : "<div class='empty'>No transactions yet</div>";

  if(barChart) barChart.destroy();
  barChart = new Chart(document.getElementById("barChart"), {
    type:"bar",
    data:{labels:["Income","Expense"],datasets:[{data:[income,expense]}]}
  });

  if(pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById("pieChart"), {
    type:"doughnut",
    data:{labels:Object.keys(map),datasets:[{data:Object.values(map)}]}
  });
}

updateCategories();
loadData();
</script>

</body>
</html>
